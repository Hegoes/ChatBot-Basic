<!DOCTYPE html> <!--tells us to use the latest version of HTML--> 
<html> <!--the root element of the HTML document-->
  <head> <!--contains meta-information about the document-->
    <title>ChatBot</title>
  </head>
  <body> <!--the body element contains the visible content of the HTML document-->

    <div class="js-container"></div> <!--a div element with a class of "js-container" that will be used as a container for rendering React components-->

  
    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/chatbot.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script> <!-- uses an external library for JSX transpilation -->
    <script type="text/babel">
        function ChatInput({ chatMessageList, setChatMessageList}){
            const [inputText, setInputText] = React.useState('');

            function saveInputText(event){
                setInputText(event.target.value);
            }

            function sendMessage(){

                const newChatMessages = [
              ...chatMessageList,
              {
                message: inputText,
                sender:'user',
                id: crypto.randomUUID()
              }
              ]

            setChatMessageList(newChatMessages);

              const response = Chatbot.getResponse(inputText);
               setChatMessageList([
              ...newChatMessages,
              {
                message: response,
                sender:'robot',
                id: crypto.randomUUID()
              }
              ]);

                setInputText('');
            }

          

            return (
                <> 
                 <input 
                    placeholder="Send a message to ChatBot" 
                    size="30"
                    onChange={saveInputText}
                    value={inputText}
                 />
                 <button onClick={sendMessage}>Send</button>
                </>
            );
        }

        function ChatMessage({message, sender}){ // defines a functional component called ChatMessage that takes in props as an argument
           // const message = props.message;
           // const sender = props.sender;
           // const {message, sender} = props; // destructuring assignment to extract message and sender from props
           
            return (
                <div> 
                    { sender === 'robot' && (
                        <img src="robot.png" width="40" /> 
                    )}
                    {message}
                    { sender === 'user' && (
                        <img src="user.png" width="40" /> 
                    )}      
                </div>      
            );
        }

        function ChatMessageList({chatMessageList}){ 
            return (
                <>
                    

                    {chatMessageList.map((chatMessage)=>{ // we have an array of components called chatMessageComponents that is created by mapping over the chatMessages array and for each chatMessage object in the array, we return a ChatMessage component with the message and sender props set to the corresponding values from the chatMessage object.  
                        return(
                            <ChatMessage
                                message={chatMessage.message} // this gets the message out of the chatMessage object and passes it as a prop to the ChatMessage component
                                sender={chatMessage.sender}
                                key={chatMessage.id}
                            />
                        );
                    })}
                </>
            );
        }
        

        function App(){ // this is used instead of a variable like const app = () cause it allows us to use JSX syntax and return a React element that represents the UI of our application. So using component is more appropriate here than using a variable because 
              
            const [ chatMessageList, setChatMessageList] = React.useState(
            [{
                message: "hello chatbot",
                sender: "user",
                id: "id1"
            },
            {
                message: "Hello human, how can I help you?",
                sender: "robot",
                id: "id2"
            },
            {
                message: "Can you get me todays date?",
                sender: "user",
                id: "id3"
            },
            {
                message: "Sure, today's date is April 29, 2026.",
                sender: "robot",
                id: "id4"

            }]);  
            
            //const [ chatMessageList, setChatMessageList]=array; thus it has been destructured at the beginning
            // const chatMessageList = array[0];
            // const setChatMessageList = array[1];
            
            
            return (
                <>
                    <ChatInput 
                    chatMessageList={chatMessageList}
                    setChatMessageList={setChatMessageList}
                    />
                    <ChatMessageList 
                        chatMessageList={chatMessageList}
                    />
                </>
            );
        } 

     

      const container = document.querySelector('.js-container');
      ReactDOM.createRoot(container).render(<App />); // renders the React element into the container element on the page
    </script>
  </body>
</html>
